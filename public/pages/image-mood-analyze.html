<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PicTrip | 분위기 기반 여행지 추천</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/image-mood-analyze.css" />
  </head>
  <body>
    <div id="site-header"></div>

    <main>
      <!-- ═══════════ HERO ═══════════ -->
      <section class="mood-hero">
        <div class="mood-hero-inner">
          <div class="mood-hero-badge">
            <span class="mood-hero-badge-pulse"></span>
            AI 분위기 분석
          </div>
          <h1 class="mood-hero-title">
            사진의 분위기를 해석해<br />어울리는 여행지를 추천해드려요
          </h1>
          <p class="mood-hero-desc">
            마음에 드는 분위기의 사진을 업로드해보세요.<br />
            AI가 색감·날씨·지형·무드를 분석해 비슷한 감성의 여행지를 추천합니다.
          </p>
        </div>
      </section>

      <!-- ═══════════ FORM ═══════════ -->
      <section class="mood-section">
        <div class="mood-container">
          <button type="button" class="back-btn">← 홈으로</button>

          <div class="mood-card">
            <div class="mood-card-grid">

              <!-- 왼쪽: 이미지 업로드 -->
              <div>
                <p class="mood-section-label">이미지 업로드</p>
                <input
                  id="moodImageInput"
                  type="file"
                  accept="image/*"
                  class="mood-file-input"
                />
                <label
                  for="moodImageInput"
                  id="moodUploadBox"
                  class="upload-box"
                >
                  <div id="moodPlaceholder" class="upload-placeholder">
                    <svg
                      width="40"
                      height="40"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="1.6"
                        d="M4 16l4.5-4.5a2 2 0 012.8 0L16 16m-2-2l1.5-1.5a2 2 0 012.8 0L20 14M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
                      />
                    </svg>
                    <p class="upload-placeholder-text">
                      클릭하여 이미지를 업로드해주세요
                    </p>
                    <p class="upload-placeholder-sub">JPG, PNG · 최대 10MB</p>
                  </div>
                  <img
                    id="moodPreview"
                    class="preview d-none"
                    alt="분위기 추천 이미지 미리보기"
                  />
                </label>
              </div>

              <!-- 오른쪽: 입력 + 액션 -->
              <div class="mood-form-col">
                <p class="mood-section-label">추가 정보</p>

                <div class="mood-field">
                  <label for="moodExtraInput" class="mood-field-label"
                    >추가사항용 텍스트</label
                  >
                  <input
                    id="moodExtraInput"
                    type="text"
                    class="mood-input"
                    placeholder="예: 조용한 곳, 사진 명소, 커플 여행, 겨울 분위기"
                  />
                </div>

                <div class="mood-actions">
                  <button
                    id="moodRecommendBtn"
                    type="button"
                    class="btn-mood-primary"
                    disabled
                  >
                    분위기 기반 여행지 추천
                  </button>
                </div>

                <div id="moodStatus" class="status"></div>
                <div id="moodError" class="error-box"></div>
              </div>

            </div>
          </div>

          <div id="moodResult" class="result"></div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script
      type="text/javascript"
      src="//dapi.kakao.com/v2/maps/sdk.js?appkey=fd290fec1340d8ed510dcf21731d2b08&autoload=false&libraries=services"
    ></script>
    <script type="module">
      import { renderHeader } from "/js/components/header.js";
      import { renderFooter } from "/js/components/footer.js";
      renderHeader({ active: "image-mood-analyze" });
      renderFooter();
    </script>
    <script src="/js/pages/image-mood-analyze.js"></script>
  </body>
</html>
