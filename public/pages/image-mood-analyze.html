<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:site_name" content="PicTrip" />
    <meta property="og:title" content="PicTrip — 사진 한 장으로 시작하는 여행" />
    <meta property="og:description" content="사진 속 분위기와 장소를 분석해 어울리는 국내 여행지를 추천하고 AI 맞춤 일정까지 자동으로 만들어드려요." />
    <meta property="og:image" content="/assets/images/PicTrip-OGTag.png" />
    <meta property="og:image:width" content="1731" />
    <meta property="og:image:height" content="909" />
    <meta property="og:image:alt" content="PicTrip — 사진으로 시작하는 AI 여행 추천" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PicTrip — 사진 한 장으로 시작하는 여행" />
    <meta name="twitter:description" content="사진 속 분위기와 장소를 분석해 어울리는 국내 여행지를 추천하고 AI 맞춤 일정까지 자동으로 만들어드려요." />
    <meta name="twitter:image" content="/assets/images/PicTrip-OGTag.png" />
    <title>PicTrip | 분위기 기반 여행지 추천</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/image-mood-analyze.css" />
    <script src="/js/common/auth-guard.js"></script>
    <script>
      PicTripGuard.requireLogin();
    </script>
  </head>
  <body>
    <div id="site-header"></div>

    <main>
      <section class="mood-hero">
        <div class="mood-hero-inner">
          <div class="mood-hero-badge">
            <span class="mood-hero-badge-pulse"></span>
            AI 분위기 분석
          </div>
          <h1 class="mood-hero-title">
            사진의 분위기를 해석해<br />어울리는 여행지를 추천해드려요
          </h1>
          <p class="mood-hero-desc">
            마음에 드는 분위기의 사진을 업로드해보세요. AI가
            색감·날씨·지형·무드를 분석해 비슷한 감성의 여행지를 추천합니다.
          </p>
        </div>
      </section>

      <section class="mood-section">
        <div class="mood-container container px-xxl-5">
          <button type="button" class="back-btn mb-4">← 홈으로</button>

          <div class="row g-4 mb-5">
            <div class="col-12 col-lg-5">
              <div
                class="mood-card p-4 h-100 d-flex flex-column justify-content-between"
              >
                <div>
                  <p class="mood-section-label mb-2">이미지 업로드</p>
                  <input
                    id="moodImageInput"
                    type="file"
                    accept="image/*"
                    class="mood-file-input"
                  />
                  <label
                    for="moodImageInput"
                    id="moodUploadBox"
                    class="upload-box w-100 mb-4"
                  >
                    <div id="moodPlaceholder" class="upload-placeholder">
                      <svg
                        width="40"
                        height="40"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="1.6"
                          d="M4 16l4.5-4.5a2 2 0 012.8 0L16 16m-2-2l1.5-1.5a2 2 0 012.8 0L20 14M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
                        />
                      </svg>
                      <p class="upload-placeholder-text">
                        클릭하여 이미지를 업로드해주세요
                      </p>
                    </div>
                    <img
                      id="moodPreview"
                      class="preview d-none"
                      alt="분위기 추천 이미지 미리보기"
                    />
                  </label>

                  <p class="mood-section-label mb-2">추가 정보</p>
                  <div class="mood-field mb-4">
                    <label for="moodExtraInput" class="mood-field-label"
                      >추가사항용 텍스트</label
                    >
                    <input
                      id="moodExtraInput"
                      type="text"
                      class="mood-input"
                      placeholder="예: 조용한 곳, 사진 명소, 커플 여행"
                    />
                  </div>
                </div>

                <div>
                  <div class="mood-actions mb-2">
                    <button
                      id="moodRecommendBtn"
                      type="button"
                      class="btn-mood-primary w-100"
                      disabled
                    >
                      분위기 기반 여행지 추천
                    </button>
                  </div>
                  <div id="moodStatus" class="status text-center"></div>
                  <div id="moodError" class="error-box"></div>
                </div>
              </div>
            </div>

            <div class="col-12 col-lg-7">
              <div
                class="bg-white rounded-4 shadow-sm border p-4 h-100"
                style="min-height: 400px"
              >
                <div class="section-label mb-3 fw-bold text-dark">
                  📊 AI 분위기 해석 결과
                </div>
                <div
                  id="moodAnalysisText"
                  class="h-100 d-flex align-items-center justify-content-center text-center text-muted"
                >
                  왼쪽에서 사진을 업로드하고 버튼을 누르시면 분위기 분석 정보가
                  이곳에 나타납니다.
                </div>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-12">
              <div class="border-top pt-4">
                <div
                  class="section-label mb-4 fw-bold text-dark"
                  style="font-size: 1.25rem"
                >
                  ✨ 추천 여행지 3곳
                </div>
                <div id="moodSpotsResult">
                  <div
                    class="text-center text-muted py-5 bg-white rounded-4 shadow-sm border"
                  >
                    분석 완료 후 맞춤 추천 여행지 리스트가 가로로 렌더링됩니다.
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script
      type="text/javascript"
      src="//dapi.kakao.com/v2/maps/sdk.js?appkey=fd290fec1340d8ed510dcf21731d2b08&autoload=false&libraries=services"
    ></script>
    <script type="module">
      import { renderHeader } from "/js/components/header.js";
      import { renderFooter } from "/js/components/footer.js";
      renderHeader({ active: "image-mood-analyze" });
      renderFooter();
    </script>
    <script src="/js/pages/image-mood-analyze.js"></script>
  </body>
</html>
