<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png" />
    <title>PicTrip | 여행 일정 생성 결과</title>
    <meta
      name="description"
      content="AI가 생성한 맞춤 여행 일정을 확인하고 저장할 수 있습니다."
    />
    <link rel="stylesheet" href="/css/site-shell.css" />
    <link rel="stylesheet" href="/css/itinerary-style.css" />
  </head>
  <body>
    <div id="site-header"></div>
    <main class="itinerary-result-page">
      <section class="result result--split" aria-live="polite">
        <div class="result-page-actions" aria-label="결과 페이지 작업">
          <a
            class="ghost-button result-toolbar__button"
            href="/pages/itinerary-create.html"
          >
            조건 새로 입력
          </a>

          <a
            class="secondary-button result-toolbar__button"
            href="/pages/itinerary-loading.html"
            id="retryButton"
          >
            같은 조건으로 다시 생성
          </a>

          <button
            class="primary-button result-toolbar__button"
            type="button"
            id="saveButton"
          >
            내 계정에 저장
          </button>
        </div>

        <div id="resultContainer"></div>
      </section>
    </main>
    <template id="emptyImageTemplate">
      <div class="card-thumb card-thumb--placeholder" aria-hidden="true">⌁</div>
    </template>

    <div id="site-footer"></div>

    <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=fd290fec1340d8ed510dcf21731d2b08&autoload=false&libraries=services"></script>
    <script type="module">
      import { renderHeader } from "/js/components/header.js";
      import { renderFooter } from "/js/components/footer.js";
      renderHeader({ active: "itinerary-create" });
      renderFooter();
    </script>
    <script type="module" src="/js/pages/itinerary-result.js"></script>
  </body>
</html>
