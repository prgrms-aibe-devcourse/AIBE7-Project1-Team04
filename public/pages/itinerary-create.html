<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png" />
    <title>PicTrip | 여행 일정 생성</title>
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/itinerary-create.css" />
    <script src="/js/common/auth-guard.js"></script>
    <script>PicTripGuard.requireLogin();</script>
  </head>
  <body>
    <div id="site-header"></div>

    <main>
      <!-- ═══════════ HERO ═══════════ -->
      <section class="plan-hero">
        <div class="plan-hero-inner">
          <div class="plan-hero-badge">
            <span class="plan-hero-badge-pulse"></span>
            AI 맞춤 일정 생성
          </div>
          <h1 class="plan-hero-title">
            여행 조건만 입력하면<br />AI가 일정을 만들어드려요
          </h1>
          <p class="plan-hero-desc">
            키워드, 일정, 예산만 알려주세요.<br />
            여행지·동선·추천 이유까지 포함된 맞춤 일정을 만들어드립니다.
          </p>
        </div>
      </section>

      <!-- ═══════════ FORM ═══════════ -->
      <section class="plan-section">
        <div class="plan-container">
          <a href="/" class="back-btn">← 홈으로</a>

          <div class="plan-card">
            <h2 class="plan-form-title">여행 조건 입력</h2>

            <form id="plannerForm">
              <div class="plan-grid">
                <!-- 키워드 -->
                <div class="plan-field">
                  <label for="keyword" class="plan-field-label">키워드</label>
                  <input
                    id="keyword"
                    name="keyword"
                    type="text"
                    class="plan-input"
                    placeholder="예시: 제주도, 노을지는 해변, 포켓몬스터"
                    required
                  />
                </div>

                <!-- 목적지 -->
                <div class="plan-field">
                  <label for="destination" class="plan-field-label">목적지</label>
                  <input
                    id="destination"
                    name="destination"
                    type="text"
                    class="plan-input"
                    placeholder="비워두면 AI가 추천"
                  />
                </div>

                <!-- 출발지 -->
                <div class="plan-field">
                  <label for="departure" class="plan-field-label">출발지</label>
                  <input
                    id="departure"
                    name="departure"
                    type="text"
                    class="plan-input"
                    placeholder="예시: 서울, 대전"
                  />
                </div>

                <!-- 여행 기간 -->
                <div class="plan-field">
                  <label for="days" class="plan-field-label">여행 기간</label>
                  <select id="days" name="days" class="plan-select">
                    <option value="1">당일치기</option>
                    <option value="2">1박 2일</option>
                    <option value="3" selected>2박 3일</option>
                    <option value="4">3박 4일</option>
                    <option value="5">4박 5일</option>
                    <option value="6">5박 6일</option>
                    <option value="7">6박 7일</option>
                    <option value="8">7박 8일</option>
                    <option value="9">8박 9일</option>
                    <option value="10">9박 10일</option>
                  </select>
                </div>

                <!-- 인원 -->
                <div class="plan-field">
                  <label for="people" class="plan-field-label">인원</label>
                  <input
                    id="people"
                    name="people"
                    type="number"
                    class="plan-input"
                    min="1"
                    max="20"
                    value="2"
                  />
                </div>

                <!-- 예산 -->
                <div class="plan-field">
                  <label for="budget" class="plan-field-label">예산</label>
                  <div class="budget-control">
                    <input
                      id="budget"
                      name="budgetAmount"
                      type="text"
                      class="plan-input"
                      placeholder="예: 80만원"
                    />
                    <div
                      class="budget-type-group"
                      role="radiogroup"
                      aria-label="예산 기준"
                    >
                      <label class="budget-type-option">
                        <input
                          type="radio"
                          name="budgetType"
                          value="perPerson"
                          checked
                        />
                        <span>1인당</span>
                      </label>
                      <label class="budget-type-option">
                        <input type="radio" name="budgetType" value="total" />
                        <span>전체</span>
                      </label>
                    </div>
                  </div>
                </div>

                <!-- AI Provider 숨김 -->
                <input
                  type="hidden"
                  id="provider"
                  name="provider"
                  value="gemini"
                />

                <!-- 추가 조건 -->
                <div class="plan-field plan-field--full">
                  <label for="notes" class="plan-field-label">추가 조건</label>
                  <textarea
                    id="notes"
                    name="notes"
                    rows="3"
                    class="plan-textarea"
                    placeholder="예: 부모님과 함께, 걷는 거리 적게, 카페 많이, 야경 포함"
                  ></textarea>
                </div>
              </div>

              <div class="plan-actions">
                <button
                  class="btn-plan-primary"
                  type="submit"
                  id="generateButton"
                >
                  <span>여행 일정 생성</span>
                  <span class="arrow" aria-hidden="true">→</span>
                </button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script type="module">
      import { renderHeader } from "/js/components/header.js";
      import { renderFooter } from "/js/components/footer.js";
      renderHeader({ active: "itinerary-create" });
      renderFooter();
    </script>
    <script type="module" src="/js/pages/itinerary-create.js"></script>
  </body>
</html>
