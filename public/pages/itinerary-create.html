<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PicTrip | 여행 일정 생성</title>
    <link rel="stylesheet" href="/css/itinerary-style.css" />
  </head>
  <body>
    <!-- 여행 조건 입력 영역 -->
    <section class="planner-shell" aria-label="여행 일정 생성 조건 입력 영역">
      <form class="planner-form" id="plannerForm">
        <div class="form-header">
          <div>
            <h2>여행 조건 입력</h2>
          </div>
        </div>
        <!-- 키워드, 목적지 -->
        <div class="field-group">
          <div class="field">
            <label for="keyword">키워드</label>
            <input
              id="keyword"
              name="keyword"
              type="text"
              placeholder="예시: 제주도, 노을지는 해변, 포켓몬스터"
              required
            />
          </div>

          <div class="field">
            <label for="destination">목적지</label>
            <input
              id="destination"
              name="destination"
              type="text"
              placeholder="비워두면 AI가 추천"
            />
          </div>
        </div>

        <!-- 출발지, 여행 기간 -->
        <div class="field-group">
          <div class="field">
            <label for="departure">출발지</label>
            <input
              id="departure"
              name="departure"
              type="text"
              placeholder="예시: 서울, 대전"
            />
          </div>

          <div class="field">
            <label for="days">여행 기간</label>
            <select id="days" name="days">
              <option value="1">당일치기</option>
              <option value="2">1박 2일</option>
              <option value="3" selected>2박 3일</option>
              <option value="4">3박 4일</option>
              <option value="5">4박 5일</option>
              <option value="6">5박 6일</option>
              <option value="7">6박 7일</option>
              <option value="8">7박 8일</option>
              <option value="9">8박 9일</option>
              <option value="10">9박 10일</option>
            </select>
          </div>
        </div>

        <!-- 인원, 예산 -->
        <div class="field-group">
          <div class="field">
            <label for="people">인원</label>
            <input
              id="people"
              name="people"
              type="number"
              min="1"
              max="20"
              value="2"
            />
          </div>

          <div class="field field--budget">
            <label for="budget">예산</label>

            <div class="budget-control">
              <input
                id="budget"
                name="budgetAmount"
                type="text"
                placeholder="예: 80만원"
              />

              <div
                class="budget-type-group"
                role="radiogroup"
                aria-label="예산 기준"
              >
                <label class="budget-type-option">
                  <input
                    type="radio"
                    name="budgetType"
                    value="perPerson"
                    checked
                  />
                  <span>1인당</span>
                </label>

                <label class="budget-type-option">
                  <input type="radio" name="budgetType" value="total" />
                  <span>전체</span>
                </label>
              </div>
            </div>
          </div>
        </div>

        <!-- AI Provider는 사용자에게 숨기고 내부적으로 Gemini 고정 -->
        <input type="hidden" id="provider" name="provider" value="gemini" />

        <!-- 추가 조건 입력 -->
        <div class="field field--full">
          <label for="notes">추가 조건</label>
          <textarea
            id="notes"
            name="notes"
            rows="3"
            placeholder="예: 부모님과 함께, 걷는 거리 적게, 카페 많이, 야경 포함"
          ></textarea>
        </div>

        <!-- 생성 버튼 -->
        <button class="primary-button" type="submit" id="generateButton">
          <span>여행 일정 생성</span>
          <span aria-hidden="true">→</span>
        </button>
      </form>
    </section>

    <script type="module" src="../js/pages/itinerary-create.js"></script>
  </body>
</html>
