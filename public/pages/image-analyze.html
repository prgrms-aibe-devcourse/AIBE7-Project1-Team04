<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이미지 여행지 추천</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/image-analyze.css" />
  </head>
  <body>
    <main class="container py-4 py-md-5 shell">
      <section id="homePage" class="page active fade-up">
        <div class="text-center mb-4 mb-md-5">
          <span class="hero-badge mb-3">이미지 기반 여행지 추천</span>
          <h1 class="page-title">어떤 방식으로 여행지를 추천할까요</h1>
          <p class="page-desc mx-auto mb-0">
            이미지를 올리고 원하는 방식에 맞게 여행지를 추천받을 수 있습니다.
            위치를 추정해서 추천할 수도 있고, 사진의 분위기를 읽어서 추천할 수도
            있습니다.
          </p>
        </div>

        <div class="home-grid">
          <button
            type="button"
            class="choice-card text-start"
            data-open="location"
          >
            <div>
              <div class="choice-kicker">MODE 01</div>
              <div class="choice-title">이미지 위치 기반 여행지 추천</div>
              <div class="choice-desc">
                사진 속 위치 단서를 활용해 어디인지 추정하고, 그 지역과 어울리는
                여행지를 추천합니다.
              </div>
            </div>
            <span class="choice-cta">위치 기반 추천 시작</span>
          </button>

          <button type="button" class="choice-card text-start" data-open="mood">
            <div>
              <div class="choice-kicker">MODE 02</div>
              <div class="choice-title">이미지 분위기 기반 여행지 추천</div>
              <div class="choice-desc">
                사진의 색감, 분위기, 계절감 같은 인상을 분석해 비슷한 감성의
                여행지를 추천합니다.
              </div>
            </div>
            <span class="choice-cta secondary">분위기 기반 추천 시작</span>
          </button>
        </div>
      </section>

      <section id="locationPage" class="page">
        <div
          class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4"
        >
          <div>
            <button type="button" class="back-btn mb-3" data-back>
              ← 홈으로
            </button>
            <h2 class="page-title mb-2">이미지 위치 기반 여행지 추천</h2>
            <p class="page-desc mb-0">
              사진을 업로드하고 위치 힌트를 입력하면, 사진의 위치를 추정한 뒤 그
              지역에 맞는 여행지를 추천합니다.
            </p>
          </div>
        </div>

        <div class="glass-card p-3 p-md-4">
          <div class="row g-4">
            <div class="col-12 col-lg-5">
              <div class="section-label">이미지 업로드</div>
              <input
                id="locationImageInput"
                type="file"
                accept="image/*"
                class="d-none"
              />
              <label
                for="locationImageInput"
                id="locationUploadBox"
                class="upload-box"
              >
                <div id="locationPlaceholder" class="upload-placeholder">
                  <svg
                    width="36"
                    height="36"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="1.6"
                      d="M4 16l4.5-4.5a2 2 0 012.8 0L16 16m-2-2l1.5-1.5a2 2 0 012.8 0L20 14M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
                    />
                  </svg>
                  이미지를 업로드하면 미리보기가 표시됩니다.
                </div>
                <img
                  id="locationPreview"
                  class="preview d-none"
                  alt="위치 추천 이미지 미리보기"
                />
              </label>
            </div>

            <div class="col-12 col-lg-7">
              <div class="section-label">추가 정보</div>
              <div class="mb-3">
                <label for="locationHintInput" class="form-label fw-bold"
                  >힌트용 텍스트</label
                >
                <input
                  id="locationHintInput"
                  type="text"
                  class="form-control form-control-lg"
                  placeholder="예: 바다, 유럽풍 건물, 골목길, 여행 시기"
                />
              </div>

              <div class="d-flex flex-wrap gap-2 mb-3">
                <button
                  id="locationRecommendBtn"
                  type="button"
                  class="btn btn-primary btn-lg px-4"
                  disabled
                >
                  위치 기반 여행지 추천
                </button>
                <button
                  id="moveToMoodBtn"
                  type="button"
                  class="btn btn-dark btn-lg px-4 d-none"
                >
                  분위기 기반 여행지 추천 →
                </button>
              </div>

              <div id="locationStatus" class="status mb-3"></div>
              <div id="locationError" class="error-box mb-3"></div>
              <div id="locationResult" class="result"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="moodPage" class="page">
        <div
          class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4"
        >
          <div>
            <button type="button" class="back-btn mb-3" data-back>
              ← 홈으로
            </button>
            <h2 class="page-title mb-2">이미지 분위기 기반 여행지 추천</h2>
            <p class="page-desc mb-0">
              사진의 분위기를 해석하고, 추가사항을 반영해 어울리는 감성 여행지를
              추천합니다.
            </p>
          </div>
        </div>

        <div class="glass-card p-3 p-md-4">
          <div class="row g-4">
            <div class="col-12 col-lg-5">
              <div class="section-label">이미지 업로드</div>
              <input
                id="moodImageInput"
                type="file"
                accept="image/*"
                class="d-none"
              />
              <label for="moodImageInput" id="moodUploadBox" class="upload-box">
                <div id="moodPlaceholder" class="upload-placeholder">
                  <svg
                    width="36"
                    height="36"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="1.6"
                      d="M4 16l4.5-4.5a2 2 0 012.8 0L16 16m-2-2l1.5-1.5a2 2 0 012.8 0L20 14M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
                    />
                  </svg>
                  이미지를 업로드하면 미리보기가 표시됩니다.
                </div>
                <img
                  id="moodPreview"
                  class="preview d-none"
                  alt="분위기 추천 이미지 미리보기"
                />
              </label>
            </div>

            <div class="col-12 col-lg-7">
              <div class="section-label">추가 정보</div>
              <div class="mb-3">
                <label for="moodExtraInput" class="form-label fw-bold"
                  >추가사항용 텍스트</label
                >
                <input
                  id="moodExtraInput"
                  type="text"
                  class="form-control form-control-lg"
                  placeholder="예: 조용한 곳, 사진 명소, 커플 여행, 겨울 분위기"
                />
              </div>

              <div class="d-flex flex-wrap gap-2 mb-3">
                <button
                  id="moodRecommendBtn"
                  type="button"
                  class="btn btn-dark btn-lg px-4"
                  disabled
                >
                  분위기 기반 여행지 추천
                </button>
              </div>

              <div id="moodStatus" class="status mb-3"></div>
              <div id="moodError" class="error-box mb-3"></div>
              <div id="moodResult" class="result"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script
      type="text/javascript"
      src="//dapi.kakao.com/v2/maps/sdk.js?appkey=fd290fec1340d8ed510dcf21731d2b08&autoload=false&libraries=services"
    ></script>
    <script src="../js/pages/image-analyze.js"></script>
  </body>
</html>
