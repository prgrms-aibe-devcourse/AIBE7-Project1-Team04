<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PicTrip | 내 여행 일정</title>
    <link rel="stylesheet" href="/css/site-shell.css" />
    <link rel="stylesheet" href="/css/itinerary-style.css" />
    <style>
      .trips-page {
        max-width: min(900px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 80px;
      }

      .trips-header {
        margin-bottom: 32px;
      }

      .trips-title {
        font-size: clamp(1.6rem, 3vw, 2.2rem);
        font-weight: 800;
        letter-spacing: -0.04em;
        margin: 0 0 8px;
      }

      .trips-subtitle {
        color: var(--muted);
        font-size: 0.95rem;
        margin: 0;
      }

      .trips-list {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .trip-card {
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 20px 24px;
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        transition: box-shadow 0.2s, border-color 0.2s;
      }

      .trip-card:hover {
        box-shadow: var(--shadow);
        border-color: rgba(47, 134, 255, 0.2);
      }

      .trip-card-body {
        flex: 1;
        min-width: 0;
        cursor: pointer;
      }

      .trip-card-title {
        font-weight: 700;
        font-size: 1rem;
        margin: 0 0 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .trip-card-title-input {
        font: inherit;
        font-weight: 700;
        font-size: 1rem;
        border: 1px solid var(--blue);
        border-radius: 6px;
        padding: 2px 8px;
        width: 100%;
        outline: none;
        margin-bottom: 4px;
      }

      .trip-card-meta {
        color: var(--muted);
        font-size: 0.85rem;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .trip-card-actions {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }

      .trip-action-btn {
        padding: 7px 14px;
        border-radius: 10px;
        font-size: 0.85rem;
        font-weight: 700;
        border: 1px solid var(--line);
        background: var(--white);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }

      .trip-action-btn:hover {
        background: var(--bg);
      }

      .trip-action-btn.danger {
        color: var(--red);
        border-color: rgba(255, 92, 104, 0.25);
      }

      .trip-action-btn.danger:hover {
        background: rgba(255, 92, 104, 0.06);
      }

      .empty-state {
        text-align: center;
        padding: 72px 24px;
        color: var(--muted);
      }

      .empty-state-icon {
        font-size: 3rem;
        margin-bottom: 16px;
      }

      .empty-state-title {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--ink);
        margin: 0 0 8px;
      }

      .empty-state-desc {
        font-size: 0.95rem;
        margin: 0 0 24px;
      }

      .loading-state {
        text-align: center;
        padding: 48px 0;
        color: var(--muted);
        font-weight: 600;
      }

      .error-state {
        text-align: center;
        padding: 48px 24px;
        color: var(--red);
        font-weight: 600;
      }

      .confirm-overlay {
        position: fixed;
        inset: 0;
        background: rgba(32, 36, 42, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }

      .confirm-box {
        background: var(--white);
        border-radius: var(--radius-md);
        padding: 28px 32px;
        max-width: 340px;
        width: calc(100% - 32px);
        box-shadow: 0 24px 60px rgba(27, 45, 78, 0.16);
      }

      .confirm-title {
        font-size: 1rem;
        font-weight: 700;
        margin: 0 0 8px;
      }

      .confirm-desc {
        color: var(--muted);
        font-size: 0.9rem;
        margin: 0 0 20px;
      }

      .confirm-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }
    </style>
  </head>
  <body>
    <div id="site-header"></div>

    <main class="trips-page">
      <div class="trips-header" style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;">
        <div>
          <h1 class="trips-title">내 여행 일정</h1>
          <p class="trips-subtitle">저장한 AI 맞춤 여행 일정을 확인하고 관리할 수 있어요.</p>
        </div>
        <a class="ghost-button" href="/pages/itinerary-create.html" style="font-size:0.9rem;padding:8px 16px;">+ 새 일정 만들기</a>
      </div>

      <div id="tripsContainer">
        <div class="loading-state">불러오는 중...</div>
      </div>
    </main>

    <div id="site-footer"></div>

    <script type="module">
      import { renderHeader } from "/js/components/header.js";
      import { renderFooter } from "/js/components/footer.js";
      renderHeader({ active: "my-trips" });
      renderFooter();
    </script>
    <script type="module" src="/js/pages/my-trips.js"></script>
  </body>
</html>
