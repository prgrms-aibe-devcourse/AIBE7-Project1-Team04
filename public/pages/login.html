<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 — TripAI</title>
    <link rel="stylesheet" href="../css/auth.css" />
  </head>
  <body>
    <a href="/" class="auth-brand">
      <div class="auth-brand-icon">✈️</div>
      <span class="auth-brand-name">TripAI</span>
    </a>

    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">다시 만나서 반가워요</h1>
        <p class="auth-subtitle">이메일과 비밀번호로 로그인하세요.</p>
      </div>

      <form id="login-form" class="auth-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">이메일</label>
          <input
            id="email"
            class="form-input"
            type="email"
            placeholder="example@email.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input
            id="password"
            class="form-input"
            type="password"
            placeholder="비밀번호를 입력하세요"
            required
            autocomplete="current-password"
          />
        </div>

        <p id="message" class="auth-message"></p>

        <button type="submit" class="btn-primary">로그인</button>
      </form>
    </div>

    <p class="auth-footer">
      아직 계정이 없으신가요? <a href="/pages/signup.html">회원가입</a>
    </p>

    <script src="../js/common/api.js"></script>
    <script src="../js/auth/login.js"></script>
  </body>
</html>
