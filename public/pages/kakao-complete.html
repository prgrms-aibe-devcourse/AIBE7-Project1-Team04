<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kakao 가입 완료 — PicTrip</title>
    <link rel="stylesheet" href="../css/auth.css" />
    <style>
      .auth-single-card {
        width: 100%;
        max-width: 460px;
        margin: 0 auto;
        padding: 40px 36px;
        background: #fff;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg, 16px);
        box-shadow: var(--shadow-card, 0 2px 12px rgba(17, 24, 39, 0.07));
      }
      .kakao-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 12px;
        margin-bottom: 14px;
        border-radius: 999px;
        background: #FEE500;
        color: #191600;
        font-size: 0.78rem;
        font-weight: 700;
      }
      .kakao-nickname {
        margin: 4px 0 8px;
        color: var(--color-text);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <header class="auth-nav">
      <div class="auth-nav-inner">
        <a href="/" class="auth-nav-logo">
          <svg class="auth-nav-logo-icon" viewBox="0 0 36 36" fill="none">
            <circle cx="10" cy="10" r="4.5" fill="#2563eb"/>
            <circle cx="26" cy="10" r="4.5" fill="#2563eb"/>
            <circle cx="10" cy="26" r="4.5" fill="#2563eb"/>
            <circle cx="26" cy="26" r="4.5" fill="#2563eb"/>
            <line x1="10" y1="10" x2="26" y2="10" stroke="#2563eb" stroke-width="1.5"/>
            <line x1="10" y1="10" x2="10" y2="26" stroke="#2563eb" stroke-width="1.5"/>
            <line x1="26" y1="10" x2="26" y2="26" stroke="#2563eb" stroke-width="1.5"/>
            <line x1="10" y1="26" x2="26" y2="26" stroke="#2563eb" stroke-width="1.5"/>
          </svg>
          <span class="auth-nav-logo-name">PicTrip</span>
        </a>
      </div>
    </header>

    <main class="auth-main">
      <div class="auth-container">
        <div class="auth-single-card">
          <span class="kakao-badge">Kakao 가입</span>
          <h1 class="auth-form-title">가입을 마저 완료해 주세요</h1>
          <p class="auth-form-subtitle">
            Kakao 계정에서 닉네임만 가져왔습니다.<br />
            서비스 이용을 위해 이메일과 비밀번호를 입력해 주세요.
          </p>

          <p class="kakao-nickname" id="kakao-nickname-line"></p>

          <form id="kakao-complete-form" class="auth-form" novalidate>
            <input type="hidden" id="state" name="state" />

            <div class="form-group">
              <label class="form-label" for="email">이메일</label>
              <div class="input-wrapper">
                <input
                  id="email"
                  name="email"
                  class="form-input"
                  type="email"
                  placeholder="이메일을 입력하세요"
                  required
                  autocomplete="email"
                />
              </div>
              <div class="field-error" id="email-error">
                <span class="field-error-icon">⚠</span>
                <span class="field-error-text"></span>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="password">비밀번호</label>
              <div class="input-wrapper">
                <input
                  id="password"
                  name="password"
                  class="form-input"
                  type="password"
                  placeholder="비밀번호 (6자 이상)"
                  required
                  minlength="6"
                  autocomplete="new-password"
                />
              </div>
              <div class="field-error" id="password-error">
                <span class="field-error-icon">⚠</span>
                <span class="field-error-text"></span>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="nickname">닉네임</label>
              <div class="input-wrapper">
                <input
                  id="nickname"
                  name="nickname"
                  class="form-input"
                  type="text"
                  placeholder="닉네임"
                  maxlength="30"
                />
              </div>
            </div>

            <p id="message" class="auth-message"></p>

            <button type="submit" class="btn-primary" id="submit-btn">
              <span class="btn-label">가입 완료</span>
              <span class="btn-spinner"></span>
            </button>
          </form>

          <p class="auth-form-footer">
            <a href="/pages/login.html">취소하고 로그인 페이지로</a>
          </p>
        </div>
      </div>
    </main>

    <script type="module" src="../js/auth/kakao-complete.js"></script>
  </body>
</html>
