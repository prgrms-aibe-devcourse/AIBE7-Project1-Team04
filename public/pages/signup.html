<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 — TripAI</title>
    <link rel="stylesheet" href="../css/auth.css" />
  </head>
  <body>
    <a href="/" class="auth-brand">
      <div class="auth-brand-icon">✈️</div>
      <span class="auth-brand-name">TripAI</span>
    </a>

    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">여행을 시작해 볼까요?</h1>
        <p class="auth-subtitle">AI 여행 플래너와 함께하는 첫 번째 여정.</p>
      </div>

      <form id="signup-form" class="auth-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">이메일</label>
          <input
            id="email"
            class="form-input"
            type="email"
            placeholder="example@email.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input
            id="password"
            class="form-input"
            type="password"
            placeholder="8자 이상 입력하세요"
            required
            autocomplete="new-password"
          />
        </div>

        <p id="message" class="auth-message"></p>

        <button type="submit" class="btn-accent">회원가입</button>
      </form>
    </div>

    <p class="auth-footer">
      이미 계정이 있으신가요? <a href="/pages/login.html">로그인</a>
    </p>

    <script src="../js/common/api.js"></script>
    <script src="../js/auth/signup.js"></script>
  </body>
</html>
