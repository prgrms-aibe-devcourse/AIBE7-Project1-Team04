<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png" />
    <title>PicTrip | 생성 중</title>
    <link rel="stylesheet" href="/css/itinerary-style.css" />
    <script src="/js/common/auth-guard.js"></script>
    <script>PicTripGuard.requireLogin();</script>
  </head>
  <body>
    <section
      class="loading-page"
      aria-live="polite"
      aria-labelledby="loadingTitle"
    >
      <div class="spinner spinner--large" aria-hidden="true"></div>
      <h1 id="loadingTitle">
        여행 일정을 생성 중입니다...<br />잠시만 기다려주세요.
      </h1>
      <p class="loading-page__description" id="loadingMessage">
        입력한 조건을 바탕으로 지도, Day별 코스, 장소별 추천 이유를 생성하고
        있어요.
      </p>

      <div
        class="loading-summary"
        id="loadingSummary"
        aria-label="입력 조건 요약"
      ></div>
      <div
        class="loading-steps"
        id="loadingSteps"
        aria-label="AI 일정 생성 과정"
      >
        <span class="is-active" data-stage="analyze">키워드 분석</span>
        <span data-stage="route">동선 구성</span>
        <span data-stage="verify">검증 진행</span>
        <span data-stage="finalize">결과 페이지 준비</span>
      </div>
    </section>
    <script type="module" src="../js/pages/itinerary-loading.js"></script>
  </body>
</html>
