<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:site_name" content="PicTrip" />
    <meta property="og:title" content="PicTrip — 사진 한 장으로 시작하는 여행" />
    <meta property="og:description" content="사진 속 분위기와 장소를 분석해 어울리는 국내 여행지를 추천하고 AI 맞춤 일정까지 자동으로 만들어드려요." />
    <meta property="og:image" content="/assets/images/PicTrip-OGTag.png" />
    <meta property="og:image:width" content="1731" />
    <meta property="og:image:height" content="909" />
    <meta property="og:image:alt" content="PicTrip — 사진으로 시작하는 AI 여행 추천" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PicTrip — 사진 한 장으로 시작하는 여행" />
    <meta name="twitter:description" content="사진 속 분위기와 장소를 분석해 어울리는 국내 여행지를 추천하고 AI 맞춤 일정까지 자동으로 만들어드려요." />
    <meta name="twitter:image" content="/assets/images/PicTrip-OGTag.png" />
    <title>PicTrip | 위치 기반 여행지 추천</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/image-location-analyze.css" />
    <script src="/js/common/auth-guard.js"></script>
    <script>PicTripGuard.requireLogin();</script>
  </head>
  <body>
    <div id="site-header"></div>

    <main>
      <!-- ═══════════ HERO ═══════════ -->
      <section class="loc-hero">
        <div class="loc-hero-inner">
          <div class="loc-hero-badge">
            <span class="loc-hero-badge-pulse"></span>
            AI 위치 분석
          </div>
          <h1 class="loc-hero-title">
            사진 속 장소를 추정해<br />여행지를 추천해드려요
          </h1>
          <p class="loc-hero-desc">
            장소 사진을 업로드하고 힌트를 적어주세요.<br />
            AI가 사진의 위치를 추정한 뒤 그 지역에 어울리는 여행지를 추천합니다.
          </p>
        </div>
      </section>

      <!-- ═══════════ FORM ═══════════ -->
      <section class="loc-section">
        <div class="loc-container">
          <button type="button" class="back-btn">← 홈으로</button>

          <div class="loc-card">
            <div class="loc-card-grid">

              <!-- 왼쪽: 이미지 업로드 -->
              <div>
                <p class="loc-section-label">이미지 업로드</p>
                <input
                  id="locationImageInput"
                  type="file"
                  accept="image/*"
                  class="loc-file-input"
                />
                <label
                  for="locationImageInput"
                  id="locationUploadBox"
                  class="upload-box"
                >
                  <div id="locationPlaceholder" class="upload-placeholder">
                    <svg
                      width="40"
                      height="40"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="1.6"
                        d="M4 16l4.5-4.5a2 2 0 012.8 0L16 16m-2-2l1.5-1.5a2 2 0 012.8 0L20 14M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
                      />
                    </svg>
                    <p class="upload-placeholder-text">
                      클릭하여 이미지를 업로드해주세요
                    </p>
                    <p class="upload-placeholder-sub">JPG, PNG · 최대 10MB</p>
                  </div>
                  <img
                    id="locationPreview"
                    class="preview d-none"
                    alt="위치 추천 이미지 미리보기"
                  />
                </label>
              </div>

              <!-- 오른쪽: 입력 + 액션 -->
              <div class="loc-form-col">
                <p class="loc-section-label">추가 정보</p>

                <div class="loc-field">
                  <label for="locationHintInput" class="loc-field-label"
                    >힌트용 텍스트</label
                  >
                  <input
                    id="locationHintInput"
                    type="text"
                    class="loc-input"
                    placeholder="예: 바다, 유럽풍 건물, 골목길, 여행 시기"
                  />
                </div>

                <div class="loc-actions">
                  <button
                    id="locationRecommendBtn"
                    type="button"
                    class="btn-loc-primary"
                    disabled
                  >
                    위치 기반 여행지 추천
                  </button>
                  <button
                    id="moveToMoodBtn"
                    type="button"
                    class="btn-loc-secondary d-none"
                  >
                    분위기 기반 추천 →
                  </button>
                </div>

                <div id="locationStatus" class="status"></div>
                <div id="locationError" class="error-box"></div>
              </div>

            </div>
          </div>

          <div id="locationResult" class="result"></div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script
      type="text/javascript"
      src="//dapi.kakao.com/v2/maps/sdk.js?appkey=fd290fec1340d8ed510dcf21731d2b08&autoload=false&libraries=services"
    ></script>
    <script type="module">
      import { renderHeader } from "/js/components/header.js";
      import { renderFooter } from "/js/components/footer.js";
      renderHeader({ active: "image-location-analyze" });
      renderFooter();
    </script>
    <script src="/js/pages/image-location-analyze.js"></script>
  </body>
</html>
