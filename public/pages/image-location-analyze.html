<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PicTrip | 위치 기반 여행지 추천</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/site-shell.css" />
    <link rel="stylesheet" href="../css/image-location-analyze.css" />
  </head>
  <body>
    <div id="site-header"></div>

    <main class="container py-4 py-md-5 shell">
      <section id="locationPage" class="page active">
        <div
          class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4"
        >
          <div>
            <button type="button" class="back-btn mb-3">← 홈으로</button>
            <h2 class="page-title mb-2">이미지 위치 기반 여행지 추천</h2>
            <p class="page-desc mb-0">
              사진을 업로드하고 위치 힌트를 입력하면, 사진의 위치를 추정한 뒤 그
              지역에 맞는 여행지를 추천합니다.
            </p>
          </div>
        </div>

        <div class="glass-card p-3 p-md-4">
          <div class="row g-4">
            <div class="col-12 col-lg-5">
              <div class="section-label">이미지 업로드</div>
              <input
                id="locationImageInput"
                type="file"
                accept="image/*"
                class="d-none"
              />
              <label
                for="locationImageInput"
                id="locationUploadBox"
                class="upload-box"
              >
                <div id="locationPlaceholder" class="upload-placeholder">
                  <svg
                    width="36"
                    height="36"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="1.6"
                      d="M4 16l4.5-4.5a2 2 0 012.8 0L16 16m-2-2l1.5-1.5a2 2 0 012.8 0L20 14M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
                    />
                  </svg>
                  이미지를 업로드하면 미리보기가 표시됩니다.
                </div>
                <img
                  id="locationPreview"
                  class="preview d-none"
                  alt="위치 추천 이미지 미리보기"
                />
              </label>
            </div>

            <div class="col-12 col-lg-7">
              <div class="section-label">추가 정보</div>
              <div class="mb-3">
                <label for="locationHintInput" class="form-label fw-bold"
                  >힌트용 텍스트</label
                >
                <input
                  id="locationHintInput"
                  type="text"
                  class="form-control form-control-lg"
                  placeholder="예: 바다, 유럽풍 건물, 골목길, 여행 시기"
                />
              </div>

              <div class="d-flex flex-wrap gap-2 mb-3">
                <button
                  id="locationRecommendBtn"
                  type="button"
                  class="btn btn-primary btn-lg px-4"
                  disabled
                >
                  위치 기반 여행지 추천
                </button>
                <button
                  id="moveToMoodBtn"
                  type="button"
                  class="btn btn-dark btn-lg px-4 d-none"
                >
                  분위기 기반 여행지 추천 →
                </button>
              </div>

              <div id="locationStatus" class="status mb-3"></div>
              <div id="locationError" class="error-box mb-3"></div>
              <div id="locationResult" class="result"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>

    <script
      type="text/javascript"
      src="//dapi.kakao.com/v2/maps/sdk.js?appkey=fd290fec1340d8ed510dcf21731d2b08&autoload=false&libraries=services"
    ></script>
    <script type="module">
      import { renderHeader } from "/js/components/header.js";
      import { renderFooter } from "/js/components/footer.js";
      renderHeader({ active: "image-location-analyze" });
      renderFooter();
    </script>
    <script src="../js/pages/image-location-analyze.js"></script>
  </body>
</html>
